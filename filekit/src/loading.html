<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileKit</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffffff;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
      }

      .loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .windows-loader {
        position: relative;
        width: 56px;
        height: 56px;
      }

      .windows-loader span {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 8px;
        height: 8px;
        margin: -4px;
        border-radius: 50%;
        background: #0078d4;

        transform: rotate(calc(var(--i) * 45deg)) translateY(-22px);

        opacity: 0;

        animation: windows-loader 1.2s linear infinite;
        animation-delay: calc(var(--i) * 0.12s);
      }

      @keyframes windows-loader {
        0% {
          opacity: 0;
          transform: rotate(calc(var(--i) * 45deg)) translateY(-22px) scale(0.4);
        }

        30% {
          opacity: 1;
          transform: rotate(calc(var(--i) * 45deg)) translateY(-22px) scale(1);
        }

        100% {
          opacity: 0;
          transform: rotate(calc(var(--i) * 45deg)) translateY(-22px) scale(0.4);
        }
      }

      h2 {
        font-size: 28px;
        font-weight: 600;
        color: #1f2937;
      }

      p {
        margin-top: -12px;
        font-size: 15px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div class="loader-wrapper">
      <div class="windows-loader">
        <span style="--i: 0"></span>
        <span style="--i: 1"></span>
        <span style="--i: 2"></span>
        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
      </div>

      <h2>FileKit</h2>
      <p>Loading...</p>
    </div>
  </body>
</html>
