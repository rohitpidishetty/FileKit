name: Build FileKit for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop-filekit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop-filekit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build FileKit installer
        run: npm run make

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: FileKit-Windows-Unsigned
          path: desktop-filekit/out/make/**
          if-no-files-found: error
          retention-days: 14