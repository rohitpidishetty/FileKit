<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FileKit</title>

    <style>
      :root {
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;

        color-scheme: light;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;

        overflow: hidden;
        user-select: none;

        background:
          radial-gradient(
            circle at 20% 15%,
            rgba(0, 120, 212, 0.12),
            transparent 36%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(96, 165, 250, 0.12),
            transparent 34%
          ),
          linear-gradient(145deg, #f7faff 0%, #ffffff 48%, #f4f8fd 100%);
      }

      .splash-screen {
        position: relative;

        width: 100%;
        height: 100%;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .window-glow {
        position: absolute;

        width: 340px;
        height: 340px;

        border-radius: 50%;

        background: rgba(0, 120, 212, 0.08);
        filter: blur(70px);

        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;

        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .app-icon-container {
        width: 106px;
        height: 106px;

        display: flex;
        align-items: center;
        justify-content: center;

        margin-bottom: 22px;

        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 24px;

        background: rgba(255, 255, 255, 0.75);

        box-shadow:
          0 18px 50px rgba(15, 23, 42, 0.12),
          0 4px 12px rgba(15, 23, 42, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);

        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      .app-icon-container img {
        width: 78px;
        height: 78px;

        display: block;
        object-fit: contain;

        -webkit-user-drag: none;
      }

      .app-name {
        font-size: 30px;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: -0.7px;

        color: #202124;
      }

      .app-description {
        margin-top: 7px;

        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.1px;

        color: #667085;
      }

      .loader-container {
        height: 48px;

        display: flex;
        align-items: center;
        justify-content: center;

        margin-top: 26px;
      }

      .windows-loader {
        position: relative;

        width: 42px;
        height: 42px;
      }

      .windows-loader span {
        position: absolute;
        top: 50%;
        left: 50%;

        width: 5px;
        height: 5px;

        margin: -2.5px;

        border-radius: 50%;

        background: #0067c0;

        opacity: 0;

        transform: rotate(calc(var(--i) * 45deg)) translateY(-16px);

        animation: windows-loading 1.15s infinite ease-in-out;
        animation-delay: calc(var(--i) * 0.09s);
      }

      @keyframes windows-loading {
        0% {
          opacity: 0.1;

          transform: rotate(calc(var(--i) * 45deg)) translateY(-16px)
            scale(0.55);
        }

        25% {
          opacity: 1;

          transform: rotate(calc(var(--i) * 45deg)) translateY(-16px) scale(1);
        }

        55% {
          opacity: 0.42;
        }

        100% {
          opacity: 0;

          transform: rotate(calc(var(--i) * 45deg)) translateY(-16px)
            scale(0.55);
        }
      }

      .loading-text {
        margin-top: 4px;

        font-size: 13px;
        font-weight: 400;

        color: #7a8494;
      }

      .footer {
        position: absolute;
        bottom: 20px;
        left: 0;

        width: 100%;

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .version {
        font-size: 11px;
        letter-spacing: 0.25px;

        color: #98a2b3;
      }

      @media (prefers-reduced-motion: reduce) {
        .windows-loader span {
          animation-duration: 2.2s;
        }
      }
    </style>
  </head>

  <body>
    <main class="splash-screen">
      <div class="window-glow"></div>

      <section class="content">
        <div class="app-icon-container">
          <!-- Image will load only in production mode -->
          <img src="./FileKit.png" alt="FileKit" />
          <!-- Dev mode -->
          <!-- <img src="./assets/FileKit.png" alt="FileKit" /> -->
        </div>

        <h1 class="app-name">FileKit</h1>

        <p class="app-description">
          File management made simple, version (1.0.0)
        </p>

        <div class="loader-container">
          <div class="windows-loader" aria-label="Loading">
            <span style="--i: 0"></span>
            <span style="--i: 1"></span>
            <span style="--i: 2"></span>
            <span style="--i: 3"></span>
            <span style="--i: 4"></span>
            <span style="--i: 5"></span>
            <span style="--i: 6"></span>
            <span style="--i: 7"></span>
          </div>
        </div>

        <p class="loading-text">Starting FileKit..</p>
      </section>
    </main>
  </body>
</html>
